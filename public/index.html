<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- SEO Meta Tags for NYC Real Estate -->
    <title>OptimaRent | Luxury Apartments for Rent in New York - Manhattan, Brooklyn</title>
    
    <meta name="description" content="Premium 1-3 bedroom apartments for rent in New York City. Manhattan, Brooklyn, Williamsburg. From $3,200/month. Fast approvals, luxury living. Apply now!" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OptimaRent | Luxury NYC Apartments - Manhattan & Brooklyn" />
    <meta property="og:description" content="Modern apartments for rent in prime NYC locations. 1-3BR from $3,200/month. Fast lease applications. Find your dream home today!" />
    <meta property="og:url" content="https://optimarent.com" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.jpg" />
    
    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="OptimaRent | NYC Luxury Rentals" />
    <meta property="twitter:description" content="1-3BR apartments from $3,200/month in Manhattan, Brooklyn. Apply for lease in minutes!" />
    <meta property="twitter:image" content="%PUBLIC_URL%/twitter-image.jpg" />
    
    <!-- Keywords -->
    <meta name="keywords" content="NYC apartments, Manhattan rentals, Brooklyn apartments, luxury apartments New York, apartments for rent NYC, 1 bedroom Manhattan, 2 bedroom Brooklyn, Williamsburg apartments, OptimaRent, lease application" />
    
    <!-- Local Business -->
    <meta name="business:contact_data:country" content="US" />
    <meta name="business:contact_data:city" content="New York" />
    <meta name="business:contact_data:region" content="New York" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://optimarent.com" />
    
    <!-- Favicon & Branding -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="%PUBLIC_URL%/fonts/Poppins.woff2" as="font" type="font/woff2" crossorigin />
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ApartmentComplex",
      "name": "OptimaRent Apartments",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "1234 Broadway",
        "addressLocality": "Manhattan",
        "addressRegion": "New York",
        "postalCode": "10001",
        "addressCountry": "US"
      },
      "numberOfAvailableUnits": "5",
      "amenityFeature": ["24/7 Security", "Rooftop Terrace", "Fitness Center", "In-Unit Laundry", "Doorman"],
      "url": "https://optimarent.com",
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 40.7589,
        "longitude": -73.9851
      }
    }
    </script>

    <script type="module" crossorigin src="%PUBLIC_URL%/index-%PUBLIC_URL%.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
